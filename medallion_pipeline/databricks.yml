# This is a Databricks asset bundle definition for medallion_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: medallion_pipeline
  uuid: e7c43c13-9c82-4dbd-9da0-d969ffe8c27f

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-c45b289c-6971.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-c45b289c-6971.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/eugenio.serrano2@alu.uclm.es to make sure we only have a single copy.
      root_path: /Workspace/Users/eugenio.serrano2@alu.uclm.es/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: eugenio.serrano2@alu.uclm.es
        level: CAN_MANAGE
